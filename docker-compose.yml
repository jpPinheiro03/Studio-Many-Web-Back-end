version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: studio-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 05032010@Bp
      MYSQL_DATABASE: core_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p05032010@Bp"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: studio-api
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/core_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: 05032010@Bp
      JWT_SECRET: StudioAgendamentoSecretKey2026SecureJWT
      JWT_EXPIRATION: 86400000
      SPRING_PROFILES_ACTIVE: dev
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      UPLOAD_DIR: /app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads

volumes:
  mysql_data:
  app_uploads:
