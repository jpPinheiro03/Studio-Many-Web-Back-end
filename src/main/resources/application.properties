server.port=${SERVER_PORT:8081}


# Ativar profile via env var
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Banco de dados (default para dev, sobrescrito por profile)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/core_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:05032010@Bp}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.cloud.compatibility-verencer.enabled=false

# JWT
jwt.secret=${JWT_SECRET:StudioAgendamentoSecretKey2026SecureJWT}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Upload de arquivos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=${UPLOAD_DIR:./uploads}

# Scheduled tasks
spring.task.scheduling.pool.size=2

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItEnabled=true
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
springdoc.info.title=Studio Agendamento API
springdoc.info.description=Servico de agendamento
springdoc.info.version=1.0.0
springdoc.info.contact.name=Studio Agendamento
springdoc.info.contact.email=contato@studioagendamento.com.br
